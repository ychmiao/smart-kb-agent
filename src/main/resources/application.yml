spring:
  application:
    name: smart-kb-agent
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/smart_kb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USERNAME:smartkb}
    password: ${MYSQL_PASSWORD:kb123456}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:kb123456}
      database: ${REDIS_DATABASE:0}
      timeout: 3s
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  shutdown: graceful

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.smartkb
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.example.smartkb: INFO

kb:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl: 15m
    refresh-token-ttl: 7d
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_DOCUMENT_BUCKET:documents}
  llm:
    providers:
      deepseek:
        base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
        api-key: ${DEEPSEEK_API_KEY}
        chat-model: ${DEEPSEEK_CHAT_MODEL:deepseek-chat}
        priority: 1
      qwen:
        base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
        api-key: ${QWEN_API_KEY}
        chat-model: ${QWEN_CHAT_MODEL:qwen-plus}
        embedding-model: ${QWEN_EMBEDDING_MODEL:text-embedding-v3}
        priority: 2
  milvus:
    host: ${MILVUS_HOST:localhost}
    port: ${MILVUS_PORT:19530}
    dimension: ${MILVUS_DIMENSION:1024}
    connect-timeout: 10s
    rpc-timeout: 60s
